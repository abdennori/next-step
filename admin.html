<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم المسؤول — يوم التوجيه الجامعي</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* أنماط خاصة بلوحة التحكم */
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .admin-header h1 {
      font-size: 24px;
      color: var(--navy);
    }

    .admin-logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 100px;
      cursor: pointer;
      font-weight: 700;
    }

    .admin-logout-btn:hover {
      background: #dc2626;
    }

    .admin-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat-card {
      background: white;
      padding: 16px 24px;
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      flex: 1 1 150px;
      text-align: center;
    }

    .stat-card .number {
      font-size: 32px;
      font-weight: 900;
      color: var(--navy);
    }

    .stat-card .label {
      font-size: 14px;
      color: var(--muted);
    }

    .admin-search {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    .admin-search input {
      padding: 10px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      flex: 1 1 180px;
      background: white;
    }

    .admin-search input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(10,143,143,0.15);
    }

    .admin-table-wrap {
      overflow-x: auto;
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 0 0 16px;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 700px;
    }

    .admin-table th {
      background: var(--navy);
      color: white;
      padding: 12px 14px;
      text-align: right;
      font-weight: 700;
    }

    .admin-table td {
      padding: 10px 14px;
      border-bottom: 1px solid #e2e8f0;
      vertical-align: middle;
    }

    .admin-table tr:hover td {
      background: #f8fafc;
    }

    .admin-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .admin-actions button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .admin-actions .edit-btn { color: var(--gold); }
    .admin-actions .edit-btn:hover { background: #fff8e1; }
    .admin-actions .delete-btn { color: #ef4444; }
    .admin-actions .delete-btn:hover { background: #fee2e2; }

    .admin-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
      align-items: center;
    }

    .admin-toolbar .btn {
      padding: 8px 20px;
      font-size: 13px;
    }

    .admin-toolbar .btn-export {
      background: #22c55e;
      color: white;
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }
    .admin-toolbar .btn-export:hover {
      box-shadow: 0 6px 18px rgba(34,197,94,0.4);
    }
    .admin-toolbar .btn-email {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 12px rgba(59,130,246,0.3);
    }
    .admin-toolbar .btn-email:hover {
      box-shadow: 0 6px 18px rgba(59,130,246,0.4);
    }

    .admin-login-box {
      max-width: 380px;
      margin: 80px auto;
      background: white;
      padding: 32px;
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
    }

    .admin-login-box h2 {
      margin-bottom: 20px;
      color: var(--navy);
    }

    .admin-login-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
    }

    .admin-login-box input:focus {
      outline: none;
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(10,143,143,0.15);
    }

    .admin-login-box .btn {
      width: 100%;
      justify-content: center;
    }

    .hidden {
      display: none !important;
    }

    .edit-form-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .edit-form-box {
      background: white;
      padding: 32px;
      border-radius: var(--radius);
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .edit-form-box h3 {
      margin-bottom: 16px;
      color: var(--navy);
    }

    .edit-form-box .reg-form-group {
      margin-bottom: 12px;
    }

    .edit-form-box .reg-actions {
      margin-top: 16px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>

  <!-- لوحة تسجيل الدخول -->
  <div id="loginBox" class="admin-login-box">
    <h2>🔐 تسجيل الدخول</h2>
    <input type="email" id="adminEmail" placeholder="البريد الإلكتروني" />
    <input type="password" id="adminPassword" placeholder="كلمة المرور" />
    <button class="btn btn-primary" id="loginBtn">دخول</button>
    <div id="loginMsg" style="margin-top:12px;font-size:13px;color:#ef4444;"></div>
  </div>

  <!-- لوحة التحكم (مخفية حتى تسجيل الدخول) -->
  <div id="adminPanel" class="admin-container hidden">
    <div class="admin-header">
      <h1>📊 لوحة تحكم المسؤول</h1>
      <button class="admin-logout-btn" id="logoutBtn">🚪 تسجيل الخروج</button>
    </div>

    <!-- الإحصائيات -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="number" id="totalCount">0</div>
        <div class="label">إجمالي المسجلين</div>
      </div>
    </div>

    <!-- البحث -->
    <div class="admin-search">
      <input type="text" id="searchName" placeholder="🔍 بحث بالاسم" />
      <input type="text" id="searchPhone" placeholder="🔍 بحث بالهاتف" />
      <input type="text" id="searchSchool" placeholder="🔍 بحث بالثانوية" />
    </div>

    <!-- الجدول -->
    <div class="admin-table-wrap">
      <table class="admin-table" id="adminTable">
        <thead>
          <tr>
            <th>#</th>
            <th>الاسم</th>
            <th>الهاتف</th>
            <th>البريد</th>
            <th>الثانوية</th>
            <th>الشعبة</th>
            <th>الولاية</th>
            <th>تاريخ التسجيل</th>
            <th style="text-align:center">إجراءات</th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
          <tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted);">جاري التحميل...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- شريط الأدوات -->
    <div class="admin-toolbar">
      <button class="btn btn-export" id="exportExcelBtn">📥 تصدير Excel</button>
      <button class="btn btn-email" id="sendEmailBtn">📧 إرسال التقرير بالبريد</button>
    </div>
  </div>

  <!-- نموذج التعديل (يظهر كـ overlay) -->
  <div id="editOverlay" class="edit-form-overlay hidden">
    <div class="edit-form-box">
      <h3>✏️ تعديل التسجيل</h3>
      <form id="editForm">
        <div class="reg-form-group">
          <label>الاسم الكامل</label>
          <input type="text" id="editFullName" required />
        </div>
        <div class="reg-form-group">
          <label>رقم الهاتف</label>
          <input type="tel" id="editPhone" required />
        </div>
        <div class="reg-form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="editEmail" />
        </div>
        <div class="reg-form-group">
          <label>الثانوية</label>
          <input type="text" id="editHighSchool" required />
        </div>
        <div class="reg-form-group">
          <label>الشعبة</label>
          <select id="editBranch" required>
            <option value="علوم تجريبية">علوم تجريبية</option>
            <option value="رياضيات">رياضيات</option>
            <option value="تقني رياضي">تقني رياضي</option>
            <option value="تسيير واقتصاد">تسيير واقتصاد</option>
            <option value="آداب وفلسفة">آداب وفلسفة</option>
            <option value="لغات أجنبية">لغات أجنبية</option>
            <option value="فنون">فنون</option>
          </select>
        </div>
        <div class="reg-form-group">
          <label>الولاية</label>
          <input type="text" id="editWilaya" />
        </div>
        <div class="reg-actions">
          <button type="button" class="btn btn-outline" id="cancelEditBtn">إلغاء</button>
          <button type="submit" class="btn btn-primary">💾 حفظ التعديلات</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ربط Firebase و Admin JS -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="admin.js"></script>
</body>
</html>
